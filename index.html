<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MK2 Rivers Fitness Hub</title>
    <meta
      name="description"
      content="MK2 Rivers Fitness — AI-powered gym management, class booking, workout planning and nutrition coaching"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/public/mk2r-logo.jpg" />
    <link rel="apple-touch-icon" href="/public/mk2r-logo.jpg" />

    <!-- ✅ Dynamic manifest swap: admin gets its own icon -->
    <link id="manifest-link" rel="manifest" href="/manifest.json" />
    <script>
      if (window.location.hash.startsWith("#admin")) {
        document
          .getElementById("manifest-link")
          .setAttribute("href", "/admin-manifest.json");
        document.title = "MK2R Admin Portal";
      }
    </script>

    <!-- fonts stay exactly as they are -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com" />
    <link href="https://fonts.cdnfonts.com/css/university" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
      rel="stylesheet"
    />

    <meta property="og:title" content="MK2 Rivers Fitness Hub" />
    <meta
      property="og:description"
      content="AI-powered gym management, class booking, workout planning and nutrition coaching"
    />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
